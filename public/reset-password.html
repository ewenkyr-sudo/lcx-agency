<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#2563EB">
<link rel="icon" href="/icons/icon.svg" type="image/svg+xml">
<title>Fuzion Pilot — Nouveau mot de passe</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--bg:#050507;--bg2:#0A0A0C;--bg3:#131316;--accent:#3B82F6;--accent2:#60A5FA;--green:#22C55E;--red:#EF4444;--text:#FAFAFA;--text2:#A1A1AA;--text3:#52525B;--border:rgba(59,130,246,0.07)}
  @keyframes auroraFloat{0%,100%{opacity:.4;transform:translate(0,0) scale(1)}50%{opacity:.6;transform:translate(20px,-15px) scale(1.05)}}
  @keyframes constellationTwinkle{0%,100%{opacity:0}50%{opacity:1}}
  @keyframes btnShimmer{0%{background-position:200% center}100%{background-position:-200% center}}
  body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;-webkit-font-smoothing:antialiased;position:relative;overflow:hidden}
  body::before{content:'';position:fixed;top:-20%;left:-10%;width:60vw;height:60vh;background:radial-gradient(ellipse,rgba(59,130,246,0.08) 0%,rgba(34,211,238,0.03) 40%,transparent 70%);animation:auroraFloat 15s ease-in-out infinite;pointer-events:none}
  body::after{content:'';position:fixed;bottom:-15%;right:-10%;width:50vw;height:50vh;background:radial-gradient(ellipse,rgba(59,130,246,0.06) 0%,rgba(59,130,246,0.03) 40%,transparent 70%);animation:auroraFloat 20s ease-in-out infinite reverse;pointer-events:none}
  .constellation{position:fixed;inset:0;pointer-events:none;z-index:0}
  .star{position:absolute;width:2px;height:2px;background:#60A5FA;border-radius:50%;box-shadow:0 0 6px rgba(192,132,252,0.4);animation:constellationTwinkle 3s ease-in-out infinite}
  .star:nth-child(1){top:10%;left:15%;animation-delay:0s}.star:nth-child(2){top:25%;left:80%;animation-delay:.7s;width:3px;height:3px}
  .star:nth-child(3){top:60%;left:25%;animation-delay:1.4s}.star:nth-child(4){top:45%;left:65%;animation-delay:2.1s;background:#22D3EE;box-shadow:0 0 8px rgba(34,211,238,0.5)}
  .star:nth-child(5){top:80%;left:45%;animation-delay:.5s}.star:nth-child(6){top:15%;left:55%;animation-delay:1.8s;width:3px;height:3px}
  .container{width:420px;max-width:90vw;position:relative;z-index:1}
  .logo{text-align:center;margin-bottom:40px}
  .logo-icon{width:76px;height:76px;background:linear-gradient(135deg,#2563EB,#3B82F6,#22D3EE);border-radius:24px;display:inline-flex;align-items:center;justify-content:center;margin-bottom:20px;position:relative}
  .logo-icon img{width:76px;height:76px;border-radius:24px}
  .logo h1{font-family:'Inter',sans-serif;font-size:28px;font-weight:700;letter-spacing:1px;background:linear-gradient(135deg,#FAFAFA,#60A5FA);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .logo p{color:var(--text2);font-size:14px;margin-top:6px}
  .card{background:rgba(10,6,21,0.6);backdrop-filter:blur(40px) saturate(1.8);-webkit-backdrop-filter:blur(40px) saturate(1.8);border:1px solid rgba(59,130,246,0.12);border-radius:24px;padding:40px;box-shadow:0 24px 80px rgba(0,0,0,0.6),0 0 80px rgba(59,130,246,0.04),0 0 0 1px rgba(255,255,255,0.04) inset}
  .form-group{margin-bottom:20px}
  .form-label{display:block;font-size:11px;font-weight:600;color:var(--text2);margin-bottom:8px;text-transform:uppercase;letter-spacing:1px}
  .form-input{width:100%;padding:13px 16px;background:rgba(59,130,246,0.04);border:1px solid rgba(59,130,246,0.1);border-radius:12px;color:var(--text);font-size:14px;font-family:inherit;outline:none;transition:all .25s ease}
  .form-input:focus{border-color:rgba(59,130,246,0.4);box-shadow:0 0 0 3px rgba(59,130,246,0.1),0 0 24px rgba(59,130,246,0.06);background:rgba(59,130,246,0.06)}
  .form-input::placeholder{color:var(--text3)}
  .btn-submit{width:100%;padding:14px;background:linear-gradient(135deg,#3B82F6,#2563EB);color:white;border:none;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .3s cubic-bezier(.4,0,.2,1);margin-top:12px;box-shadow:0 2px 8px rgba(59,130,246,0.35),0 0 0 1px rgba(255,255,255,0.08) inset;position:relative;overflow:hidden}
  .btn-submit::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.15),transparent);background-size:200% 100%;animation:btnShimmer 3s ease-in-out infinite}
  .btn-submit:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(59,130,246,0.45),0 0 40px rgba(59,130,246,0.1)}
  .btn-submit:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}
  .btn-submit:disabled::before{display:none}
  .msg{padding:12px 16px;border-radius:12px;font-size:13px;margin-bottom:16px;display:none;text-align:center}
  .msg.error{background:rgba(251,113,133,0.08);border:1px solid rgba(251,113,133,0.15);color:var(--red)}
  .msg.success{background:rgba(52,211,153,0.08);border:1px solid rgba(52,211,153,0.15);color:var(--green)}
  .msg.show{display:block}
  .footer{text-align:center;margin-top:24px;color:var(--text3);font-size:12px}
  .footer a{color:var(--accent2);text-decoration:none}
</style>
</head>
<body>

<div class="constellation">
  <div class="star"></div><div class="star"></div><div class="star"></div>
  <div class="star"></div><div class="star"></div><div class="star"></div>
</div>

<div class="container">
  <div class="logo">
    <div class="logo-icon"><img src="/assets/fuzion-pilot-logo.svg" alt="Fuzion Pilot"></div>
    <h1>Fuzion Pilot</h1>
    <p>Choisissez votre nouveau mot de passe</p>
  </div>

  <div class="card">
    <div class="msg error" id="error-msg"></div>
    <div class="msg success" id="success-msg"></div>

    <form id="reset-form" onsubmit="handleReset(event)">
      <div class="form-group">
        <label class="form-label">Nouveau mot de passe</label>
        <input class="form-input" type="password" id="password" placeholder="Minimum 8 caracteres" required minlength="8" autocomplete="new-password">
      </div>
      <div class="form-group">
        <label class="form-label">Confirmer le mot de passe</label>
        <input class="form-input" type="password" id="password-confirm" placeholder="Retapez le mot de passe" required minlength="8" autocomplete="new-password">
      </div>
      <button class="btn-submit" type="submit" id="btn-submit">Réinitialiser mon mot de passe</button>
    </form>
  </div>

  <div class="footer">
    <a href="/">Retour a la connexion</a>
  </div>
</div>

<script>
var token = new URLSearchParams(window.location.search).get('token');
if (!token) {
  document.getElementById('reset-form').style.display = 'none';
  var err = document.getElementById('error-msg');
  err.textContent = 'Lien invalide. Demandez un nouveau lien de reinitialisation.';
  err.classList.add('show');
}

async function handleReset(e) {
  e.preventDefault();
  var pwd = document.getElementById('password').value;
  var confirm = document.getElementById('password-confirm').value;
  var btn = document.getElementById('btn-submit');
  var errEl = document.getElementById('error-msg');
  var successEl = document.getElementById('success-msg');
  errEl.classList.remove('show');
  successEl.classList.remove('show');

  if (pwd.length < 8) {
    errEl.textContent = 'Le mot de passe doit faire au moins 8 caracteres.';
    errEl.classList.add('show');
    return;
  }
  if (pwd !== confirm) {
    errEl.textContent = 'Les deux mots de passe ne correspondent pas.';
    errEl.classList.add('show');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Reinitialisation...';

  try {
    var res = await fetch('/api/reset-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token: token, newPassword: pwd })
    });
    var data = await res.json();

    if (res.ok) {
      document.getElementById('reset-form').style.display = 'none';
      successEl.textContent = 'Mot de passe modifie ! Redirection vers la connexion...';
      successEl.classList.add('show');
      // Clear old auth cookie/token
      document.cookie = 'token=;path=/;expires=Thu, 01 Jan 1970 00:00:00 GMT';
      localStorage.removeItem('token');
      localStorage.removeItem('user');
      setTimeout(function() { window.location.href = '/'; }, 3000);
    } else {
      errEl.textContent = data.error || 'Erreur lors de la reinitialisation.';
      errEl.classList.add('show');
      btn.disabled = false;
      btn.textContent = 'Reinitialiser mon mot de passe';
    }
  } catch(ex) {
    errEl.textContent = 'Erreur reseau. Verifiez votre connexion.';
    errEl.classList.add('show');
    btn.disabled = false;
    btn.textContent = 'Reinitialiser mon mot de passe';
  }
}
</script>
</body>
</html>
