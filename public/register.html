<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#7C3AED">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="/icons/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-180.png">
<title data-i18n="app.register_title">Fuzion Pilot — Inscription</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=Cinzel:wght@400;500;600;700;800;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #04020A; --bg2: #0A0615; --bg3: #130D21;
    --accent: #A855F7; --accent2: #C084FC;
    --green: #34D399; --red: #FB7185; --pink: #F0ABFC;
    --text: #EDE4FF; --text2: #9585B0; --text3: #6B5A84;
    --border: rgba(168,85,247,0.07);
  }
  @keyframes auroraFloat {
    0%, 100% { opacity: 0.4; transform: translate(0, 0) scale(1); }
    50% { opacity: 0.6; transform: translate(20px, -15px) scale(1.05); }
  }
  @keyframes constellationTwinkle {
    0%, 100% { opacity: 0; }
    50% { opacity: 1; }
  }
  @keyframes mysticPulse {
    0%, 100% { box-shadow: 0 8px 48px rgba(168,85,247,0.35), 0 0 0 1px rgba(255,255,255,0.12) inset; }
    50% { box-shadow: 0 8px 48px rgba(168,85,247,0.5), 0 0 60px rgba(168,85,247,0.15), 0 0 0 1px rgba(255,255,255,0.12) inset; }
  }
  body {
    font-family: 'Sora', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-font-smoothing: antialiased;
    position: relative;
    overflow: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    top: -20%; left: -10%;
    width: 60vw; height: 60vh;
    background: radial-gradient(ellipse, rgba(168,85,247,0.08) 0%, rgba(34,211,238,0.03) 40%, transparent 70%);
    animation: auroraFloat 15s ease-in-out infinite;
    pointer-events: none;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -15%; right: -10%;
    width: 50vw; height: 50vh;
    background: radial-gradient(ellipse, rgba(240,171,252,0.06) 0%, rgba(168,85,247,0.03) 40%, transparent 70%);
    animation: auroraFloat 20s ease-in-out infinite reverse;
    pointer-events: none;
  }
  .constellation {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
  }
  .star {
    position: absolute; width: 2px; height: 2px; background: #C084FC; border-radius: 50%;
    box-shadow: 0 0 6px rgba(192,132,252,0.4); animation: constellationTwinkle 3s ease-in-out infinite;
  }
  .star:nth-child(1) { top: 12%; left: 18%; animation-delay: 0.2s; }
  .star:nth-child(2) { top: 28%; left: 75%; animation-delay: 0.9s; width: 3px; height: 3px; }
  .star:nth-child(3) { top: 55%; left: 20%; animation-delay: 1.6s; }
  .star:nth-child(4) { top: 40%; left: 60%; animation-delay: 2.3s; background: #22D3EE; box-shadow: 0 0 8px rgba(34,211,238,0.5); }
  .star:nth-child(5) { top: 85%; left: 50%; animation-delay: 0.5s; }
  .star:nth-child(6) { top: 18%; left: 50%; animation-delay: 1.8s; width: 3px; height: 3px; }
  .star:nth-child(7) { top: 65%; left: 82%; animation-delay: 2.5s; background: #F0ABFC; box-shadow: 0 0 6px rgba(240,171,252,0.4); }
  .star:nth-child(8) { top: 38%; left: 8%; animation-delay: 1.1s; }
  .login-container {
    width: 440px;
    max-width: 90vw;
    position: relative;
    z-index: 1;
  }
  .login-logo {
    text-align: center;
    margin-bottom: 40px;
  }
  .login-logo-icon {
    width: 76px; height: 76px;
    background: linear-gradient(135deg, #7C3AED, #A855F7, #22D3EE);
    border-radius: 24px;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 36px;
    margin-bottom: 20px;
    animation: mysticPulse 4s ease-in-out infinite;
    position: relative;
  }
  .login-logo-icon::after {
    content: '';
    position: absolute;
    inset: -3px;
    border-radius: 27px;
    background: linear-gradient(135deg, rgba(168,85,247,0.35), rgba(34,211,238,0.2));
    z-index: -1;
    filter: blur(12px);
  }
  .login-logo h1 {
    font-family: 'Cinzel', serif;
    font-size: 28px; font-weight: 700; letter-spacing: 1px;
    background: linear-gradient(135deg, #EDE4FF, #C084FC);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .login-logo p {
    color: var(--text2); font-size: 14px; margin-top: 6px;
  }
  .login-card {
    background: rgba(10,6,21,0.6);
    backdrop-filter: blur(40px) saturate(1.8);
    -webkit-backdrop-filter: blur(40px) saturate(1.8);
    border: 1px solid rgba(168,85,247,0.12);
    border-radius: 24px;
    padding: 40px;
    box-shadow: 0 24px 80px rgba(0,0,0,0.6), 0 0 80px rgba(168,85,247,0.04), 0 0 0 1px rgba(255,255,255,0.04) inset;
  }
  .form-group { margin-bottom: 20px; }
  .form-label {
    display: block; font-size: 11px; font-weight: 600;
    color: var(--text2); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px;
  }
  .form-input {
    width: 100%; padding: 13px 16px;
    background: rgba(168,85,247,0.04); border: 1px solid rgba(168,85,247,0.1);
    border-radius: 12px; color: var(--text);
    font-size: 14px; font-family: inherit; outline: none;
    transition: all 0.25s ease;
  }
  .form-input:focus { border-color: rgba(168,85,247,0.4); box-shadow: 0 0 0 3px rgba(168,85,247,0.1), 0 0 24px rgba(168,85,247,0.06); background: rgba(168,85,247,0.06); }
  .form-input::placeholder { color: var(--text3); }
  .btn-login {
    width: 100%; padding: 14px;
    background: linear-gradient(135deg, #A855F7, #7C3AED);
    color: white; border: none; border-radius: 14px;
    font-size: 15px; font-weight: 700; cursor: pointer;
    font-family: inherit; transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
    margin-top: 12px;
    box-shadow: 0 2px 8px rgba(168,85,247,0.35), 0 0 0 1px rgba(255,255,255,0.08) inset;
    position: relative;
    overflow: hidden;
  }
  .btn-login::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
    background-size: 200% 100%;
    animation: btnShimmer 3s ease-in-out infinite;
  }
  @keyframes btnShimmer {
    0% { background-position: 200% center; }
    100% { background-position: -200% center; }
  }
  .btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(168,85,247,0.45), 0 0 40px rgba(168,85,247,0.1), 0 0 0 1px rgba(255,255,255,0.12) inset; }
  .btn-login:active { transform: scale(0.98); }
  .btn-login:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
  .btn-login:disabled::before { display: none; }
  .error-msg {
    background: rgba(251,113,133,0.08);
    border: 1px solid rgba(251,113,133,0.15);
    color: var(--red);
    padding: 10px 14px; border-radius: 10px;
    font-size: 13px; margin-bottom: 16px;
    display: none;
    backdrop-filter: blur(8px);
  }
  .error-msg.show { display: block; }
  .login-footer {
    text-align: center; margin-top: 24px;
    color: var(--text3); font-size: 12px;
  }
  .login-footer a {
    color: var(--accent2); text-decoration: none;
  }
  .login-footer a:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="constellation">
  <div class="star"></div><div class="star"></div><div class="star"></div>
  <div class="star"></div><div class="star"></div><div class="star"></div>
  <div class="star"></div><div class="star"></div>
</div>

<div class="login-container">
  <div class="login-logo">
    <img src="/assets/fuzion-pilot-logo.svg" alt="Fuzion Pilot" class="login-logo-icon" style="padding:0;font-size:0">
    <h1 data-i18n="register.title">Creer ton agence</h1>
    <p data-i18n="register.subtitle">Inscris-toi et lance ton dashboard en quelques secondes</p>
  </div>

  <div class="login-card">
    <div class="error-msg" id="error-msg"></div>

    <form id="register-form">
      <div class="form-group">
        <label class="form-label" data-i18n="register.agency_name">Nom de ton agence</label>
        <input class="form-input" type="text" id="agency_name" placeholder="Mon Agence" data-i18n-placeholder="register.agency_name_placeholder" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label" data-i18n="register.display_name">Ton prenom / pseudo</label>
        <input class="form-input" type="text" id="display_name" placeholder="Ewen" data-i18n-placeholder="register.display_name_placeholder" required>
      </div>
      <div class="form-group">
        <label class="form-label" data-i18n="register.username">Nom d'utilisateur</label>
        <input class="form-input" type="text" id="username" placeholder="ewen" data-i18n-placeholder="register.username_placeholder" required autocomplete="username">
      </div>
      <div class="form-group">
        <label class="form-label" data-i18n="register.password">Mot de passe (min 8 caracteres)</label>
        <input class="form-input" type="password" id="password" placeholder="Ton mot de passe" data-i18n-placeholder="register.password_placeholder" required autocomplete="new-password" minlength="8">
      </div>
      <button class="btn-login" type="submit" id="btn-register" data-i18n="register.submit">Creer mon agence</button>
    </form>
  </div>

  <div class="login-footer">
    <span data-i18n="register.has_account">Deja un compte ?</span> <a href="/" data-i18n="register.login">Se connecter</a>
  </div>
</div>

<script src="/js/i18n.js"></script>
<script>
  // Check if already logged in
  fetch('/api/me').then(r => {
    if (r.ok) window.location.href = '/dashboard';
  }).catch(() => {});

  document.getElementById('register-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('btn-register');
    const err = document.getElementById('error-msg');
    btn.disabled = true;
    btn.textContent = 'Creation en cours...';
    err.classList.remove('show');

    try {
      const res = await fetch('/api/register', {
        method: 'POST',
        credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          agency_name: document.getElementById('agency_name').value.trim(),
          display_name: document.getElementById('display_name').value.trim(),
          username: document.getElementById('username').value.toLowerCase().trim(),
          password: document.getElementById('password').value
        })
      });

      const data = await res.json();

      if (res.ok) {
        if (data.token) localStorage.setItem('token', data.token);
        window.location.href = '/dashboard';
      } else {
        err.textContent = data.error || 'Erreur lors de l\'inscription';
        err.classList.add('show');
      }
    } catch (ex) {
      err.textContent = 'Erreur reseau - verifie ta connexion';
      err.classList.add('show');
    }

    btn.disabled = false;
    btn.textContent = 'Creer mon agence';
  });
</script>

</body>
</html>
