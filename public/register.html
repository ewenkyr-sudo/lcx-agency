<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#10B981">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="/icons/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-180.png">
<title>LCX Agency — Inscription</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #050507; --bg2: #0C0D10; --bg3: #151619;
    --accent: #10B981; --accent2: #34D399;
    --green: #22C55E; --red: #F43F5E; --pink: #F472B6;
    --text: #E8EAED; --text2: #6B7280; --text3: #4B5563;
    --border: rgba(255,255,255,0.06);
  }
  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    background-image:
      radial-gradient(ellipse at 30% 20%, rgba(16,185,129,0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 70% 80%, rgba(6,182,212,0.04) 0%, transparent 50%);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-font-smoothing: antialiased;
  }
  .login-container {
    width: 440px;
    max-width: 90vw;
  }
  .login-logo {
    text-align: center;
    margin-bottom: 40px;
  }
  .login-logo-icon {
    width: 72px; height: 72px;
    background: linear-gradient(135deg, #10B981, #06B6D4);
    border-radius: 22px;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 36px;
    margin-bottom: 20px;
    box-shadow: 0 8px 40px rgba(16,185,129,0.35), 0 0 0 1px rgba(255,255,255,0.1) inset;
  }
  .login-logo h1 {
    font-size: 28px; font-weight: 800; letter-spacing: -1px;
  }
  .login-logo p {
    color: var(--text2); font-size: 14px; margin-top: 6px;
  }
  .login-card {
    background: rgba(12,13,16,0.8);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 24px;
    padding: 40px;
    box-shadow: 0 24px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.03) inset;
  }
  .form-group { margin-bottom: 20px; }
  .form-label {
    display: block; font-size: 12px; font-weight: 600;
    color: var(--text2); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px;
  }
  .form-input {
    width: 100%; padding: 13px 16px;
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px; color: var(--text);
    font-size: 14px; font-family: inherit; outline: none;
    transition: all 0.2s ease;
  }
  .form-input:focus { border-color: #10B981; box-shadow: 0 0 0 3px rgba(16,185,129,0.12); background: rgba(255,255,255,0.06); }
  .form-input::placeholder { color: var(--text3); }
  .btn-login {
    width: 100%; padding: 14px;
    background: #10B981;
    color: white; border: none; border-radius: 14px;
    font-size: 15px; font-weight: 700; cursor: pointer;
    font-family: inherit; transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
    margin-top: 12px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.3), 0 0 0 1px rgba(16,185,129,0.2) inset;
  }
  .btn-login:hover { background: #059669; transform: translateY(-2px); box-shadow: 0 8px 32px rgba(16,185,129,0.3), 0 0 0 1px rgba(16,185,129,0.2) inset; }
  .btn-login:active { transform: scale(0.98); }
  .btn-login:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
  .error-msg {
    background: rgba(248,113,113,0.08);
    border: 1px solid rgba(248,113,113,0.2);
    color: var(--red);
    padding: 10px 14px; border-radius: 10px;
    font-size: 13px; margin-bottom: 16px;
    display: none;
  }
  .error-msg.show { display: block; }
  .login-footer {
    text-align: center; margin-top: 24px;
    color: var(--text3); font-size: 12px;
  }
  .login-footer a {
    color: var(--accent2); text-decoration: none;
  }
  .login-footer a:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="login-container">
  <div class="login-logo">
    <div class="login-logo-icon">👑</div>
    <h1>Creer ton agence</h1>
    <p>Inscris-toi et lance ton dashboard en quelques secondes</p>
  </div>

  <div class="login-card">
    <div class="error-msg" id="error-msg"></div>

    <form id="register-form">
      <div class="form-group">
        <label class="form-label">Nom de ton agence</label>
        <input class="form-input" type="text" id="agency_name" placeholder="Mon Agence" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label">Ton prenom / pseudo</label>
        <input class="form-input" type="text" id="display_name" placeholder="Ewen" required>
      </div>
      <div class="form-group">
        <label class="form-label">Nom d'utilisateur</label>
        <input class="form-input" type="text" id="username" placeholder="ewen" required autocomplete="username">
      </div>
      <div class="form-group">
        <label class="form-label">Mot de passe (min 8 caracteres)</label>
        <input class="form-input" type="password" id="password" placeholder="Ton mot de passe" required autocomplete="new-password" minlength="8">
      </div>
      <button class="btn-login" type="submit" id="btn-register">Creer mon agence</button>
    </form>
  </div>

  <div class="login-footer">
    Deja un compte ? <a href="/">Se connecter</a>
  </div>
</div>

<script>
  // Check if already logged in
  fetch('/api/me').then(r => {
    if (r.ok) window.location.href = '/dashboard';
  }).catch(() => {});

  document.getElementById('register-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('btn-register');
    const err = document.getElementById('error-msg');
    btn.disabled = true;
    btn.textContent = 'Creation en cours...';
    err.classList.remove('show');

    try {
      const res = await fetch('/api/register', {
        method: 'POST',
        credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          agency_name: document.getElementById('agency_name').value.trim(),
          display_name: document.getElementById('display_name').value.trim(),
          username: document.getElementById('username').value.toLowerCase().trim(),
          password: document.getElementById('password').value
        })
      });

      const data = await res.json();

      if (res.ok) {
        if (data.token) localStorage.setItem('token', data.token);
        window.location.href = '/dashboard';
      } else {
        err.textContent = data.error || 'Erreur lors de l\'inscription';
        err.classList.add('show');
      }
    } catch (ex) {
      err.textContent = 'Erreur reseau - verifie ta connexion';
      err.classList.add('show');
    }

    btn.disabled = false;
    btn.textContent = 'Creer mon agence';
  });
</script>

</body>
</html>
