<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LCX Agency - Dashboard</title>
<style>
/* Full CSS content truncated for space - using fetch instead */
</style>
</head>
<body>

<!-- SIDEBAR -->
<nav class="sidebar">
  <div class="logo">
    <div class="logo-icon">🚀</div>
    <div>
      <h1>LCX Agency</h1>
      <span>Management Suite</span>
    </div>
  </div>

  <div id="nav-principal" class="nav-section">
    <div class="nav-label">Principal</div>
    <div class="nav-item active" data-section="dashboard" onclick="switchSection(event)">
      <span class="nav-icon">📊</span> Dashboard
    </div>
    <div class="nav-item" data-section="planning" onclick="switchSection(event)">
      <span class="nav-icon">📋</span> Planning
    </div>
    <div class="nav-item" data-section="tasks" onclick="switchSection(event)">
      <span class="nav-icon">✔️</span> Tâches
      <span class="nav-badge" id="tasks-badge">5</span>
    </div>
  </div>

  <div id="nav-teams" class="nav-section">
    <div class="nav-label">Équipes</div>
    <div class="nav-item" data-section="models" onclick="switchSection(event)">
      <span class="nav-icon">🎭</span> Modèles
    </div>
    <div class="nav-item" data-section="chatters" onclick="switchSection(event)">
      <span class="nav-icon">💬</span> Chatteurs
    </div>
    <div class="nav-item" data-section="outreach" onclick="switchSection(event)">
      <span class="nav-icon">🎯</span> Outreach
    </div>
    <div class="nav-item" data-section="va" onclick="switchSection(event)">
      <span class="nav-icon">🤖</span> VA
    </div>
  </div>

  <div id="nav-tools" class="nav-section">
    <div class="nav-label">Outils</div>
    <div class="nav-item" data-section="stats" onclick="switchSection(event)">
      <span class="nav-icon">📈</span> Stats & Subs
    </div>
    <div class="nav-item" data-section="coaching" onclick="switchSection(event)">
      <span class="nav-icon">🏆</span> Coaching
    </div>
    <div class="nav-item" data-section="performances" onclick="switchSection(event)">
      <span class="nav-icon">⚡</span> Performances
    </div>
  </div>

  <div class="sidebar-footer" onclick="handleLogout()">
    <div class="user-info">
      <div class="user-avatar" id="user-avatar">E</div>
      <div>
        <div class="user-name" id="user-name">Loading...</div>
        <div class="user-role" id="user-role">Loading...</div>
      </div>
    </div>
  </div>
</nav>

<!-- MAIN CONTENT -->
<div class="main">
  <!-- DASHBOARD SECTION -->
  <div class="section active" id="section-dashboard">
    <div class="page-header">
      <div>
        <div class="page-title">Dashboard</div>
        <div class="page-subtitle">Vue d'ensemble de ton agencé</div>
      </div>
      <div class="header-actions" id="dashboard-actions"></div>
    </div>
    <div id="dashboard-content"></div>
  </div>
</div>

<script>
// Global state
let currentUser = null;

// Initialize
document.addEventListener('DOMContentLoaded', async () => {
  try {
    await fetchCurrentUser();
  } catch (err) {
    console.error('Init error:', err);
    window.location.href = '/';
  }
});

async function fetchCurrentUser() {
  const res = await fetch('/api/me', { credentials: 'include' });
  if (res.status === 401) window.location.href = '/';
  if (!res.ok) throw new Error('Failed to fetch user');
  currentUser = await res.json();
  updateUserUI();
}

function updateUserUI() {
  document.getElementById('user-name').textContent = currentUser.display_name || 'User';
  document.getElementById('user-role').textContent = currentUser.role === 'admin' ? 'Admin' : currentUser.role;
  document.getElementById('user-avatar').textContent = (currentUser.display_name || 'U').charAt(0).toUpperCase();
}

function switchSection(event) {
  const section = event.currentTarget.getAttribute('data-section');
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById('section-' + section).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
  event.currentTarget.classList.add('active');
}

async function handleLogout() {
  await fetch('/api/logout', { method: 'POST', credentials: 'include' });
  window.location.href = '/';
}
</script>

</body>
</html>
