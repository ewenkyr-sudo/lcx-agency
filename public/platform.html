<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#8b5cf6">
<title>LCX Platform Admin</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0f0f13; --bg2: #1a1a24; --bg3: #22222f;
    --accent: #8b5cf6; --accent2: #a78bfa;
    --green: #10b981; --red: #ef4444; --pink: #ec4899;
    --yellow: #f59e0b;
    --text: #e4e4eb; --text2: #9898ab; --text3: #6b6b80;
    --border: #2a2a3a; --radius: 12px;
  }
  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 32px;
  }
  .header {
    display: flex; align-items: center; gap: 16px;
    margin-bottom: 32px;
  }
  .header h1 { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; }
  .header .badge {
    background: var(--pink); color: white; padding: 4px 12px;
    border-radius: 20px; font-size: 11px; font-weight: 700;
  }
  .stats-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px; margin-bottom: 32px;
  }
  .stat-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 20px;
  }
  .stat-card .label { font-size: 13px; color: var(--text3); margin-bottom: 4px; }
  .stat-card .value { font-size: 28px; font-weight: 800; }
  .panel {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 24px;
  }
  .panel h2 { font-size: 18px; font-weight: 700; margin-bottom: 16px; }
  table {
    width: 100%; border-collapse: collapse; font-size: 14px;
  }
  th, td {
    text-align: left; padding: 12px 16px;
    border-bottom: 1px solid var(--border);
  }
  th {
    font-size: 12px; text-transform: uppercase;
    color: var(--text3); font-weight: 600; letter-spacing: 0.5px;
  }
  .status-active { color: var(--green); }
  .status-disabled { color: var(--red); }
  .btn {
    padding: 6px 14px; border-radius: 8px; border: none;
    font-size: 12px; font-weight: 600; cursor: pointer;
    font-family: inherit; transition: all 0.2s;
  }
  .btn-green { background: rgba(16,185,129,0.15); color: var(--green); }
  .btn-green:hover { background: rgba(16,185,129,0.25); }
  .btn-red { background: rgba(239,68,68,0.15); color: var(--red); }
  .btn-red:hover { background: rgba(239,68,68,0.25); }
  .back-link {
    color: var(--accent2); text-decoration: none; font-size: 14px;
  }
  .back-link:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="header">
  <h1>Platform Admin</h1>
  <span class="badge">SUPER ADMIN</span>
  <div style="flex:1"></div>
  <a href="/dashboard" class="back-link">Retour au dashboard</a>
</div>

<div class="stats-grid" id="stats-grid">
  <div class="stat-card">
    <div class="label">Agences</div>
    <div class="value" id="stat-agencies">-</div>
  </div>
  <div class="stat-card">
    <div class="label">Utilisateurs</div>
    <div class="value" id="stat-users">-</div>
  </div>
  <div class="stat-card">
    <div class="label">Modeles</div>
    <div class="value" id="stat-models">-</div>
  </div>
</div>

<div class="panel">
  <h2>Agences</h2>
  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Nom</th>
        <th>Proprietaire</th>
        <th>Utilisateurs</th>
        <th>Modeles</th>
        <th>Leads</th>
        <th>Statut</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="agencies-table"></tbody>
  </table>
</div>

<script>
async function loadData() {
  try {
    const [statsRes, agenciesRes] = await Promise.all([
      fetch('/api/platform/stats', { credentials: 'include' }),
      fetch('/api/platform/agencies', { credentials: 'include' })
    ]);

    if (!statsRes.ok || !agenciesRes.ok) {
      if (statsRes.status === 403 || agenciesRes.status === 403) {
        window.location.href = '/dashboard';
        return;
      }
    }

    const stats = await statsRes.json();
    document.getElementById('stat-agencies').textContent = stats.agencies;
    document.getElementById('stat-users').textContent = stats.users;
    document.getElementById('stat-models').textContent = stats.models;

    const agencies = await agenciesRes.json();
    const tbody = document.getElementById('agencies-table');
    tbody.innerHTML = agencies.map(a => `
      <tr>
        <td>${a.id}</td>
        <td><strong>${a.name}</strong></td>
        <td>${a.owner_name || '-'}</td>
        <td>${a.user_count}</td>
        <td>${a.model_count}</td>
        <td>${a.lead_count}</td>
        <td class="${a.active ? 'status-active' : 'status-disabled'}">${a.active ? 'Actif' : 'Desactive'}</td>
        <td>
          ${a.active
            ? `<button class="btn btn-red" onclick="toggleAgency(${a.id}, false)">Desactiver</button>`
            : `<button class="btn btn-green" onclick="toggleAgency(${a.id}, true)">Activer</button>`
          }
        </td>
      </tr>
    `).join('');
  } catch (e) {
    console.error('Load error:', e);
  }
}

async function toggleAgency(id, active) {
  await fetch('/api/platform/agencies/' + id, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    credentials: 'include',
    body: JSON.stringify({ active })
  });
  loadData();
}

// Check auth
fetch('/api/me', { credentials: 'include' }).then(r => {
  if (!r.ok) window.location.href = '/';
  return r.json();
}).then(user => {
  if (user.role !== 'platform_admin') window.location.href = '/dashboard';
  else loadData();
}).catch(() => window.location.href = '/');
</script>

</body>
</html>
