<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#2563EB">
<title>LCX Platform Admin</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #050507; --bg2: #0A0A0C; --bg3: #131316;
    --accent: #3B82F6; --accent2: #60A5FA;
    --green: #22C55E; --red: #EF4444; --pink: #8B5CF6;
    --yellow: #FBBF24;
    --text: #FAFAFA; --text2: #A1A1AA; --text3: #52525B;
    --border: rgba(59,130,246,0.07); --radius: 14px;
  }
  @keyframes constellationTwinkle {
    0%, 100% { opacity: 0; }
    50% { opacity: 1; }
  }
  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 32px;
    position: relative;
  }
  body::before {
    content: '';
    position: fixed;
    top: -20%; left: -10%;
    width: 50vw; height: 50vh;
    background: radial-gradient(ellipse, rgba(59,130,246,0.06) 0%, transparent 70%);
    pointer-events: none;
  }
  .constellation {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
  }
  .star {
    position: absolute; width: 2px; height: 2px; background: #60A5FA; border-radius: 50%;
    box-shadow: 0 0 6px rgba(192,132,252,0.4); animation: constellationTwinkle 3s ease-in-out infinite;
  }
  .star:nth-child(1) { top: 5%; left: 30%; animation-delay: 0s; }
  .star:nth-child(2) { top: 20%; left: 85%; animation-delay: 1s; width: 3px; height: 3px; }
  .star:nth-child(3) { top: 70%; left: 10%; animation-delay: 2s; }
  .star:nth-child(4) { top: 40%; left: 50%; animation-delay: 0.5s; background: #22D3EE; box-shadow: 0 0 8px rgba(34,211,238,0.5); }
  .star:nth-child(5) { top: 85%; left: 65%; animation-delay: 1.5s; }
  .star:nth-child(6) { top: 55%; left: 90%; animation-delay: 2.5s; background: #8B5CF6; box-shadow: 0 0 6px rgba(240,171,252,0.4); }
  .header {
    display: flex; align-items: center; gap: 16px;
    margin-bottom: 32px;
    position: relative;
    z-index: 1;
  }
  .header h1 { font-family: 'Inter', sans-serif; font-size: 24px; font-weight: 700; letter-spacing: 0.5px; background: linear-gradient(135deg, #FAFAFA, #60A5FA); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .header .badge {
    background: linear-gradient(135deg, #3B82F6, #2563EB); color: white; padding: 4px 12px;
    border-radius: 20px; font-size: 11px; font-weight: 700;
    box-shadow: 0 2px 12px rgba(59,130,246,0.4);
  }
  .stats-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px; margin-bottom: 32px;
    position: relative;
    z-index: 1;
  }
  .stat-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 20px;
    transition: all 0.3s ease;
  }
  .stat-card:hover { border-color: rgba(59,130,246,0.15); box-shadow: 0 8px 32px rgba(0,0,0,0.3), 0 0 20px rgba(59,130,246,0.05); transform: translateY(-2px); }
  .stat-card .label { font-size: 13px; color: var(--text3); margin-bottom: 4px; }
  .stat-card .value { font-family: 'Inter', sans-serif; font-size: 28px; font-weight: 800; background: linear-gradient(135deg, #FAFAFA, #60A5FA); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .panel {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 24px;
    position: relative;
    z-index: 1;
  }
  .panel h2 { font-family: 'Inter', sans-serif; font-size: 18px; font-weight: 700; margin-bottom: 16px; }
  table {
    width: 100%; border-collapse: collapse; font-size: 14px;
  }
  th, td {
    text-align: left; padding: 12px 16px;
    border-bottom: 1px solid var(--border);
  }
  th {
    font-size: 12px; text-transform: uppercase;
    color: var(--text3); font-weight: 600; letter-spacing: 0.5px;
  }
  tr:hover td { background: rgba(59,130,246,0.03); }
  .status-active { color: var(--green); }
  .status-disabled { color: var(--red); }
  .btn {
    padding: 6px 14px; border-radius: 8px; border: none;
    font-size: 12px; font-weight: 600; cursor: pointer;
    font-family: inherit; transition: all 0.2s;
  }
  .btn-green { background: rgba(16,185,129,0.15); color: var(--green); }
  .btn-green:hover { background: rgba(16,185,129,0.25); }
  .btn-red { background: rgba(239,68,68,0.15); color: var(--red); }
  .btn-red:hover { background: rgba(239,68,68,0.25); }
  .back-link {
    color: var(--accent2); text-decoration: none; font-size: 14px;
  }
  .back-link:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="constellation">
  <div class="star"></div><div class="star"></div><div class="star"></div>
  <div class="star"></div><div class="star"></div><div class="star"></div>
</div>

<div class="header">
  <h1>Platform Admin</h1>
  <span class="badge">SUPER ADMIN</span>
  <div style="flex:1"></div>
  <a href="/dashboard" class="back-link">Retour au dashboard</a>
</div>

<div class="stats-grid" id="stats-grid">
  <div class="stat-card">
    <div class="label">Agences</div>
    <div class="value" id="stat-agencies">-</div>
  </div>
  <div class="stat-card">
    <div class="label">Utilisateurs</div>
    <div class="value" id="stat-users">-</div>
  </div>
  <div class="stat-card">
    <div class="label">Modeles</div>
    <div class="value" id="stat-models">-</div>
  </div>
</div>

<div class="panel">
  <h2>Agences</h2>
  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Nom</th>
        <th>Proprietaire</th>
        <th>Utilisateurs</th>
        <th>Modeles</th>
        <th>Leads</th>
        <th>Statut</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="agencies-table"></tbody>
  </table>
</div>

<script>
async function loadData() {
  try {
    const [statsRes, agenciesRes] = await Promise.all([
      fetch('/api/platform/stats', { credentials: 'include' }),
      fetch('/api/platform/agencies', { credentials: 'include' })
    ]);

    if (!statsRes.ok || !agenciesRes.ok) {
      if (statsRes.status === 403 || agenciesRes.status === 403) {
        window.location.href = '/dashboard';
        return;
      }
    }

    const stats = await statsRes.json();
    document.getElementById('stat-agencies').textContent = stats.agencies;
    document.getElementById('stat-users').textContent = stats.users;
    document.getElementById('stat-models').textContent = stats.models;

    const agencies = await agenciesRes.json();
    const tbody = document.getElementById('agencies-table');
    tbody.innerHTML = agencies.map(a => `
      <tr>
        <td>${a.id}</td>
        <td><strong>${a.name}</strong></td>
        <td>${a.owner_name || '-'}</td>
        <td>${a.user_count}</td>
        <td>${a.model_count}</td>
        <td>${a.lead_count}</td>
        <td class="${a.active ? 'status-active' : 'status-disabled'}">${a.active ? 'Actif' : 'Desactive'}</td>
        <td>
          ${a.active
            ? `<button class="btn btn-red" onclick="toggleAgency(${a.id}, false)">Desactiver</button>`
            : `<button class="btn btn-green" onclick="toggleAgency(${a.id}, true)">Activer</button>`
          }
          <button class="btn btn-red" onclick="deleteAgency(${a.id}, '${a.name.replace(/'/g, "\\'")}')">Supprimer</button>
        </td>
      </tr>
    `).join('');
  } catch (e) {
    console.error('Load error:', e);
  }
}

async function toggleAgency(id, active) {
  await fetch('/api/platform/agencies/' + id, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    credentials: 'include',
    body: JSON.stringify({ active })
  });
  loadData();
}

async function deleteAgency(id, name) {
  if (!confirm('SUPPRIMER l\'agence "' + name + '" et TOUTES ses donnees (utilisateurs, leads, modeles, etc.) ?\n\nCette action est IRREVERSIBLE.')) return;
  if (!confirm('Confirmation finale : supprimer definitivement "' + name + '" ?')) return;
  const res = await fetch('/api/platform/agencies/' + id, { method: 'DELETE', credentials: 'include' });
  if (res.ok) {
    loadData();
  } else {
    alert('Erreur lors de la suppression');
  }
}

// Check auth
fetch('/api/me', { credentials: 'include' }).then(r => {
  if (!r.ok) window.location.href = '/';
  return r.json();
}).then(user => {
  if (user.role !== 'platform_admin') window.location.href = '/dashboard';
  else loadData();
}).catch(() => window.location.href = '/');
</script>

</body>
</html>
