<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#D4A574">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="/icons/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-180.png">
<title>LCX Agency — Connexion</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #07060B; --bg2: #0D0C14; --bg3: #15131E;
    --accent: #D4A574; --accent2: #E8C9A0;
    --green: #34D399; --red: #FB7185; --pink: #F0ABFC;
    --text: #F0ECF5; --text2: #8B839B; --text3: #5C5470;
    --border: rgba(255,255,255,0.06);
  }
  @keyframes auroraFloat {
    0%, 100% { opacity: 0.5; transform: translate(0, 0) scale(1); }
    50% { opacity: 0.7; transform: translate(20px, -15px) scale(1.05); }
  }
  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-font-smoothing: antialiased;
    position: relative;
    overflow: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    top: -20%; left: -10%;
    width: 60vw; height: 60vh;
    background: radial-gradient(ellipse, rgba(167,139,250,0.08) 0%, transparent 70%);
    animation: auroraFloat 15s ease-in-out infinite;
    pointer-events: none;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -15%; right: -10%;
    width: 50vw; height: 50vh;
    background: radial-gradient(ellipse, rgba(212,165,116,0.06) 0%, transparent 70%);
    animation: auroraFloat 20s ease-in-out infinite reverse;
    pointer-events: none;
  }
  .login-container {
    width: 400px;
    max-width: 90vw;
    position: relative;
    z-index: 1;
  }
  .login-logo {
    text-align: center;
    margin-bottom: 40px;
  }
  .login-logo-icon {
    width: 76px; height: 76px;
    background: linear-gradient(135deg, #D4A574, #A78BFA, #67E8F9);
    border-radius: 24px;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 36px;
    margin-bottom: 20px;
    box-shadow: 0 8px 48px rgba(212,165,116,0.35), 0 0 0 1px rgba(255,255,255,0.12) inset;
    position: relative;
  }
  .login-logo-icon::after {
    content: '';
    position: absolute;
    inset: -3px;
    border-radius: 27px;
    background: linear-gradient(135deg, rgba(212,165,116,0.3), rgba(167,139,250,0.2));
    z-index: -1;
    filter: blur(12px);
  }
  .login-logo h1 {
    font-size: 30px; font-weight: 800; letter-spacing: -1px;
    background: linear-gradient(135deg, #F0ECF5, #D4A574);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .login-logo p {
    color: var(--text2); font-size: 14px; margin-top: 6px;
  }
  .login-card {
    background: rgba(13,12,20,0.6);
    backdrop-filter: blur(40px) saturate(1.8);
    -webkit-backdrop-filter: blur(40px) saturate(1.8);
    border: 1px solid rgba(212,165,116,0.1);
    border-radius: 24px;
    padding: 40px;
    box-shadow: 0 24px 80px rgba(0,0,0,0.5), 0 0 80px rgba(212,165,116,0.03), 0 0 0 1px rgba(255,255,255,0.04) inset;
  }
  .form-group { margin-bottom: 20px; }
  .form-label {
    display: block; font-size: 11px; font-weight: 600;
    color: var(--text2); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px;
  }
  .form-input {
    width: 100%; padding: 13px 16px;
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07);
    border-radius: 12px; color: var(--text);
    font-size: 14px; font-family: inherit; outline: none;
    transition: all 0.25s ease;
  }
  .form-input:focus { border-color: rgba(212,165,116,0.4); box-shadow: 0 0 0 3px rgba(212,165,116,0.08), 0 0 24px rgba(212,165,116,0.04); background: rgba(255,255,255,0.06); }
  .form-input::placeholder { color: var(--text3); }
  .btn-login {
    width: 100%; padding: 14px;
    background: linear-gradient(135deg, #D4A574, #C08B5C);
    color: white; border: none; border-radius: 14px;
    font-size: 15px; font-weight: 700; cursor: pointer;
    font-family: inherit; transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
    margin-top: 12px;
    box-shadow: 0 2px 8px rgba(212,165,116,0.3), 0 0 0 1px rgba(255,255,255,0.08) inset;
    position: relative;
    overflow: hidden;
  }
  .btn-login::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
    background-size: 200% 100%;
    animation: btnShimmer 3s ease-in-out infinite;
  }
  @keyframes btnShimmer {
    0% { background-position: 200% center; }
    100% { background-position: -200% center; }
  }
  .btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(212,165,116,0.4), 0 0 0 1px rgba(255,255,255,0.12) inset; }
  .btn-login:active { transform: scale(0.98); }
  .btn-login:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
  .btn-login:disabled::before { display: none; }
  .error-msg {
    background: rgba(251,113,133,0.08);
    border: 1px solid rgba(251,113,133,0.15);
    color: var(--red);
    padding: 10px 14px; border-radius: 10px;
    font-size: 13px; margin-bottom: 16px;
    display: none;
    backdrop-filter: blur(8px);
  }
  .error-msg.show { display: block; }
  .login-footer {
    text-align: center; margin-top: 24px;
    color: var(--text3); font-size: 12px;
  }
</style>
</head>
<body>

<div class="login-container">
  <div class="login-logo">
    <div class="login-logo-icon">👑</div>
    <h1>LCX Agency</h1>
    <p>Connecte-toi pour accéder au dashboard</p>
  </div>

  <div class="login-card">
    <div class="error-msg" id="error-msg"></div>

    <form id="login-form">
      <div class="form-group">
        <label class="form-label">Nom d'utilisateur</label>
        <input class="form-input" type="text" id="username" placeholder="Ton pseudo" required autocomplete="username" autofocus>
      </div>
      <div class="form-group">
        <label class="form-label">Mot de passe</label>
        <input class="form-input" type="password" id="password" placeholder="Ton mot de passe" required autocomplete="current-password">
      </div>
      <button class="btn-login" type="submit" id="btn-login">Se connecter</button>
    </form>
  </div>

  <div class="login-footer">
    <a href="/register" style="color:#D4A574;text-decoration:none">Creer une agence</a> &middot; LCX Agency Dashboard v1.0
  </div>
</div>

<script>
  // Check if already logged in
  fetch('/api/me', { credentials: 'include' }).then(r => {
    if (r.ok) window.location.href = '/dashboard';
  }).catch(() => {});

  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('btn-login');
    const err = document.getElementById('error-msg');
    btn.disabled = true;
    btn.textContent = 'Connexion...';
    err.classList.remove('show');

    try {
      const res = await fetch('/api/login', {
        method: 'POST',
        credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          username: document.getElementById('username').value.toLowerCase().trim(),
          password: document.getElementById('password').value
        })
      });

      const data = await res.json();

      if (res.ok) {
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        window.location.href = '/dashboard';
      } else {
        err.textContent = data.error || 'Erreur de connexion';
        err.classList.add('show');
      }
    } catch (ex) {
      err.textContent = 'Erreur réseau — vérifie ta connexion';
      err.classList.add('show');
    }

    btn.disabled = false;
    btn.textContent = 'Se connecter';
  });
</script>
<script>
  (function() {
    var APP_VERSION = '2026-04-18i';
    var lastVersion = localStorage.getItem('app_version');
    if (lastVersion !== APP_VERSION) {
      localStorage.setItem('app_version', APP_VERSION);
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(regs) {
          regs.forEach(function(r) { r.unregister(); });
        });
      }
      if ('caches' in window) {
        caches.keys().then(function(keys) {
          keys.forEach(function(k) { caches.delete(k); });
        });
      }
      setTimeout(function() { location.reload(true); }, 500);
      return;
    }
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').then(function(reg) {
        reg.addEventListener('updatefound', function() {
          var nw = reg.installing;
          nw.addEventListener('statechange', function() {
            if (nw.state === 'activated') location.reload();
          });
        });
        setInterval(function() { reg.update(); }, 10000);
        reg.update();
      });
    }
  })();
</script>

</body>
</html>
