<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#8b5cf6">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="/icons/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-180.png">
<title>LCX Agency — Connexion</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0c0c10; --bg2: #151519; --bg3: #1e1e25;
    --accent: #7c6aef; --accent2: #9d8cf7;
    --green: #34d399; --red: #f87171; --pink: #f472b6;
    --text: #eaeaf0; --text2: #8a8a9a; --text3: #55555f;
    --border: rgba(255,255,255,0.06);
  }
  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: var(--bg);
    background-image: radial-gradient(ellipse at 50% 30%, rgba(124,106,239,0.06) 0%, transparent 50%);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-font-smoothing: antialiased;
  }
  .login-container {
    width: 400px;
    max-width: 90vw;
  }
  .login-logo {
    text-align: center;
    margin-bottom: 40px;
  }
  .login-logo-icon {
    width: 64px; height: 64px;
    background: linear-gradient(135deg, #7c6aef, #c084fc, #f472b6);
    border-radius: 20px;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 32px;
    margin-bottom: 16px;
    box-shadow: 0 8px 32px rgba(124,106,239,0.3);
  }
  .login-logo h1 {
    font-size: 28px; font-weight: 800; letter-spacing: -1px;
  }
  .login-logo p {
    color: var(--text2); font-size: 14px; margin-top: 6px;
  }
  .login-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 36px;
    box-shadow: 0 16px 64px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,255,0.03);
  }
  .form-group { margin-bottom: 20px; }
  .form-label {
    display: block; font-size: 12px; font-weight: 600;
    color: var(--text2); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px;
  }
  .form-input {
    width: 100%; padding: 12px 16px;
    background: rgba(255,255,255,0.04); border: 1px solid var(--border);
    border-radius: 12px; color: var(--text);
    font-size: 14px; font-family: inherit; outline: none;
    transition: all 0.25s ease;
  }
  .form-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(124,106,239,0.12); }
  .form-input::placeholder { color: var(--text3); }
  .btn-login {
    width: 100%; padding: 14px;
    background: linear-gradient(135deg, #7c6aef, #9d8cf7);
    color: white; border: none; border-radius: 12px;
    font-size: 15px; font-weight: 700; cursor: pointer;
    font-family: inherit; transition: all 0.25s ease;
    margin-top: 8px;
    box-shadow: 0 4px 20px rgba(124,106,239,0.3);
  }
  .btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(124,106,239,0.4); }
  .btn-login:active { transform: scale(0.98); }
  .btn-login:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
  .error-msg {
    background: rgba(248,113,113,0.08);
    border: 1px solid rgba(248,113,113,0.2);
    color: var(--red);
    padding: 10px 14px; border-radius: 10px;
    font-size: 13px; margin-bottom: 16px;
    display: none;
  }
  .error-msg.show { display: block; }
  .login-footer {
    text-align: center; margin-top: 24px;
    color: var(--text3); font-size: 12px;
  }
</style>
</head>
<body>

<div class="login-container">
  <div class="login-logo">
    <div class="login-logo-icon">👑</div>
    <h1>LCX Agency</h1>
    <p>Connecte-toi pour accéder au dashboard</p>
  </div>

  <div class="login-card">
    <div class="error-msg" id="error-msg"></div>

    <form id="login-form">
      <div class="form-group">
        <label class="form-label">Nom d'utilisateur</label>
        <input class="form-input" type="text" id="username" placeholder="Ton pseudo" required autocomplete="username" autofocus>
      </div>
      <div class="form-group">
        <label class="form-label">Mot de passe</label>
        <input class="form-input" type="password" id="password" placeholder="Ton mot de passe" required autocomplete="current-password">
      </div>
      <button class="btn-login" type="submit" id="btn-login">Se connecter</button>
    </form>
  </div>

  <div class="login-footer">
    <a href="/register" style="color:#a78bfa;text-decoration:none">Creer une agence</a> &middot; LCX Agency Dashboard v1.0
  </div>
</div>

<script>
  // Check if already logged in
  fetch('/api/me', { credentials: 'include' }).then(r => {
    if (r.ok) window.location.href = '/dashboard';
  }).catch(() => {});

  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('btn-login');
    const err = document.getElementById('error-msg');
    btn.disabled = true;
    btn.textContent = 'Connexion...';
    err.classList.remove('show');

    try {
      const res = await fetch('/api/login', {
        method: 'POST',
        credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          username: document.getElementById('username').value.toLowerCase().trim(),
          password: document.getElementById('password').value
        })
      });

      const data = await res.json();

      if (res.ok) {
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        window.location.href = '/dashboard';
      } else {
        err.textContent = data.error || 'Erreur de connexion';
        err.classList.add('show');
      }
    } catch (ex) {
      err.textContent = 'Erreur réseau — vérifie ta connexion';
      err.classList.add('show');
    }

    btn.disabled = false;
    btn.textContent = 'Se connecter';
  });
</script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').then((reg) => {
      reg.addEventListener('updatefound', () => {
        const newWorker = reg.installing;
        newWorker.addEventListener('statechange', () => {
          if (newWorker.state === 'activated') window.location.reload();
        });
      });
      setInterval(() => reg.update(), 60000);
    });
  }
</script>

</body>
</html>
