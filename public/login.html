<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#7C3AED">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="/icons/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-180.png">
<title data-i18n="app.login_title">Fuzion Pilot — Connexion</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=Cinzel:wght@400;500;600;700;800;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #04020A; --bg2: #0A0615; --bg3: #130D21;
    --accent: #A855F7; --accent2: #C084FC;
    --green: #34D399; --red: #FB7185; --pink: #F0ABFC;
    --text: #EDE4FF; --text2: #9585B0; --text3: #6B5A84;
    --border: rgba(168,85,247,0.07);
  }
  @keyframes auroraFloat {
    0%, 100% { opacity: 0.4; transform: translate(0, 0) scale(1); }
    50% { opacity: 0.6; transform: translate(20px, -15px) scale(1.05); }
  }
  @keyframes constellationTwinkle {
    0%, 100% { opacity: 0; }
    50% { opacity: 1; }
  }
  @keyframes mysticPulse {
    0%, 100% { box-shadow: 0 8px 48px rgba(168,85,247,0.35), 0 0 0 1px rgba(255,255,255,0.12) inset; }
    50% { box-shadow: 0 8px 48px rgba(168,85,247,0.5), 0 0 60px rgba(168,85,247,0.15), 0 0 0 1px rgba(255,255,255,0.12) inset; }
  }
  body {
    font-family: 'Sora', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-font-smoothing: antialiased;
    position: relative;
    overflow: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    top: -20%; left: -10%;
    width: 60vw; height: 60vh;
    background: radial-gradient(ellipse, rgba(168,85,247,0.08) 0%, rgba(34,211,238,0.03) 40%, transparent 70%);
    animation: auroraFloat 15s ease-in-out infinite;
    pointer-events: none;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -15%; right: -10%;
    width: 50vw; height: 50vh;
    background: radial-gradient(ellipse, rgba(240,171,252,0.06) 0%, rgba(168,85,247,0.03) 40%, transparent 70%);
    animation: auroraFloat 20s ease-in-out infinite reverse;
    pointer-events: none;
  }
  /* Constellation particles */
  .constellation {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }
  .star {
    position: absolute;
    width: 2px; height: 2px;
    background: #C084FC;
    border-radius: 50%;
    box-shadow: 0 0 6px rgba(192,132,252,0.4);
    animation: constellationTwinkle 3s ease-in-out infinite;
  }
  .star:nth-child(1) { top: 10%; left: 15%; animation-delay: 0s; }
  .star:nth-child(2) { top: 25%; left: 80%; animation-delay: 0.7s; width: 3px; height: 3px; }
  .star:nth-child(3) { top: 60%; left: 25%; animation-delay: 1.4s; }
  .star:nth-child(4) { top: 45%; left: 65%; animation-delay: 2.1s; width: 1px; height: 1px; }
  .star:nth-child(5) { top: 80%; left: 45%; animation-delay: 0.5s; }
  .star:nth-child(6) { top: 15%; left: 55%; animation-delay: 1.8s; width: 3px; height: 3px; background: #22D3EE; box-shadow: 0 0 8px rgba(34,211,238,0.5); }
  .star:nth-child(7) { top: 70%; left: 85%; animation-delay: 2.5s; }
  .star:nth-child(8) { top: 35%; left: 10%; animation-delay: 1.1s; width: 1px; height: 1px; }
  .star:nth-child(9) { top: 90%; left: 70%; animation-delay: 0.3s; background: #F0ABFC; box-shadow: 0 0 6px rgba(240,171,252,0.4); }
  .star:nth-child(10) { top: 5%; left: 40%; animation-delay: 1.6s; }
  .star:nth-child(11) { top: 50%; left: 90%; animation-delay: 2.3s; width: 2px; height: 2px; background: #22D3EE; box-shadow: 0 0 6px rgba(34,211,238,0.4); }
  .star:nth-child(12) { top: 75%; left: 5%; animation-delay: 0.9s; }
  .login-container {
    width: 400px;
    max-width: 90vw;
    position: relative;
    z-index: 1;
  }
  .login-logo {
    text-align: center;
    margin-bottom: 40px;
  }
  .login-logo-icon {
    width: 76px; height: 76px;
    background: linear-gradient(135deg, #7C3AED, #A855F7, #22D3EE);
    border-radius: 24px;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 36px;
    margin-bottom: 20px;
    animation: mysticPulse 4s ease-in-out infinite;
    position: relative;
  }
  .login-logo-icon::after {
    content: '';
    position: absolute;
    inset: -3px;
    border-radius: 27px;
    background: linear-gradient(135deg, rgba(168,85,247,0.35), rgba(34,211,238,0.2));
    z-index: -1;
    filter: blur(12px);
  }
  .login-logo h1 {
    font-family: 'Cinzel', serif;
    font-size: 28px; font-weight: 700; letter-spacing: 1px;
    background: linear-gradient(135deg, #EDE4FF, #C084FC);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .login-logo p {
    color: var(--text2); font-size: 14px; margin-top: 6px;
  }
  .login-card {
    background: rgba(10,6,21,0.6);
    backdrop-filter: blur(40px) saturate(1.8);
    -webkit-backdrop-filter: blur(40px) saturate(1.8);
    border: 1px solid rgba(168,85,247,0.12);
    border-radius: 24px;
    padding: 40px;
    box-shadow: 0 24px 80px rgba(0,0,0,0.6), 0 0 80px rgba(168,85,247,0.04), 0 0 0 1px rgba(255,255,255,0.04) inset;
  }
  .form-group { margin-bottom: 20px; }
  .form-label {
    display: block; font-size: 11px; font-weight: 600;
    color: var(--text2); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px;
  }
  .form-input {
    width: 100%; padding: 13px 16px;
    background: rgba(168,85,247,0.04); border: 1px solid rgba(168,85,247,0.1);
    border-radius: 12px; color: var(--text);
    font-size: 14px; font-family: inherit; outline: none;
    transition: all 0.25s ease;
  }
  .form-input:focus { border-color: rgba(168,85,247,0.4); box-shadow: 0 0 0 3px rgba(168,85,247,0.1), 0 0 24px rgba(168,85,247,0.06); background: rgba(168,85,247,0.06); }
  .form-input::placeholder { color: var(--text3); }
  .btn-login {
    width: 100%; padding: 14px;
    background: linear-gradient(135deg, #A855F7, #7C3AED);
    color: white; border: none; border-radius: 14px;
    font-size: 15px; font-weight: 700; cursor: pointer;
    font-family: inherit; transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
    margin-top: 12px;
    box-shadow: 0 2px 8px rgba(168,85,247,0.35), 0 0 0 1px rgba(255,255,255,0.08) inset;
    position: relative;
    overflow: hidden;
  }
  .btn-login::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
    background-size: 200% 100%;
    animation: btnShimmer 3s ease-in-out infinite;
  }
  @keyframes btnShimmer {
    0% { background-position: 200% center; }
    100% { background-position: -200% center; }
  }
  .btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(168,85,247,0.45), 0 0 40px rgba(168,85,247,0.1), 0 0 0 1px rgba(255,255,255,0.12) inset; }
  .btn-login:active { transform: scale(0.98); }
  .btn-login:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
  .btn-login:disabled::before { display: none; }
  .error-msg {
    background: rgba(251,113,133,0.08);
    border: 1px solid rgba(251,113,133,0.15);
    color: var(--red);
    padding: 10px 14px; border-radius: 10px;
    font-size: 13px; margin-bottom: 16px;
    display: none;
    backdrop-filter: blur(8px);
  }
  .error-msg.show { display: block; }
  .login-footer {
    text-align: center; margin-top: 24px;
    color: var(--text3); font-size: 12px;
  }
</style>
</head>
<body>

<div class="constellation">
  <div class="star"></div><div class="star"></div><div class="star"></div>
  <div class="star"></div><div class="star"></div><div class="star"></div>
  <div class="star"></div><div class="star"></div><div class="star"></div>
  <div class="star"></div><div class="star"></div><div class="star"></div>
</div>

<div class="login-container">
  <div class="login-logo">
    <img src="/assets/fuzion-pilot-logo.svg" alt="Fuzion Pilot" class="login-logo-icon" style="padding:0;font-size:0">
    <h1 data-i18n="app.brand">Fuzion Pilot</h1>
    <p data-i18n="login.subtitle">Connecte-toi pour acceder au dashboard</p>
  </div>

  <div class="login-card">
    <div class="error-msg" id="error-msg"></div>

    <form id="login-form">
      <div class="form-group">
        <label class="form-label" data-i18n="login.username">Nom d'utilisateur</label>
        <input class="form-input" type="text" id="username" data-i18n-placeholder="login.username_placeholder" placeholder="Ton pseudo" required autocomplete="username" autofocus>
      </div>
      <div class="form-group">
        <label class="form-label" data-i18n="login.password">Mot de passe</label>
        <input class="form-input" type="password" id="password" data-i18n-placeholder="login.password_placeholder" placeholder="Ton mot de passe" required autocomplete="current-password">
      </div>
      <button class="btn-login" type="submit" id="btn-login" data-i18n="login.submit">Se connecter</button>
    </form>

    <!-- Forgot password -->
    <div id="forgot-section" style="margin-top:16px;text-align:center">
      <a href="#" onclick="showForgotForm(event)" style="color:#9585B0;font-size:12px;text-decoration:none">Mot de passe oublie ?</a>
      <div id="forgot-form" style="display:none;margin-top:12px">
        <input class="form-input" type="text" id="forgot-username" placeholder="Username ou email" style="margin-bottom:8px">
        <button class="btn-login" type="button" onclick="sendForgotPassword()" style="font-size:13px;padding:10px">Envoyer le lien</button>
        <div id="forgot-msg" style="display:none;margin-top:10px;font-size:12px;color:#34D399;background:rgba(52,211,153,0.08);padding:8px 12px;border-radius:8px"></div>
      </div>
    </div>
  </div>

  <div class="login-footer">
    <a href="/register" style="color:#C084FC;text-decoration:none" data-i18n="login.create_agency">Creer une agence</a> &middot; <span data-i18n="login.footer">Fuzion Pilot v1.0</span>
  </div>
</div>

<script src="/js/i18n.js"></script>
<script>
  // Check if already logged in
  fetch('/api/me', { credentials: 'include' }).then(r => {
    if (r.ok) window.location.href = '/dashboard';
  }).catch(() => {});

  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('btn-login');
    const err = document.getElementById('error-msg');
    btn.disabled = true;
    btn.textContent = 'Connexion...';
    err.classList.remove('show');

    try {
      const res = await fetch('/api/login', {
        method: 'POST',
        credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          username: document.getElementById('username').value.toLowerCase().trim(),
          password: document.getElementById('password').value
        })
      });

      const data = await res.json();

      if (res.ok) {
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        window.location.href = '/dashboard';
      } else {
        err.textContent = data.error || 'Erreur de connexion';
        err.classList.add('show');
      }
    } catch (ex) {
      err.textContent = 'Erreur reseau — verifie ta connexion';
      err.classList.add('show');
    }

    btn.disabled = false;
    btn.textContent = 'Se connecter';
  });

  function showForgotForm(e) {
    e.preventDefault();
    var form = document.getElementById('forgot-form');
    form.style.display = form.style.display === 'none' ? 'block' : 'none';
  }

  async function sendForgotPassword() {
    var username = document.getElementById('forgot-username').value.trim();
    if (!username) return;
    var msg = document.getElementById('forgot-msg');
    try {
      await fetch('/api/forgot-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: username })
      });
    } catch(e) {}
    msg.textContent = 'Si ce compte existe et a un email associe, un lien de reinitialisation a ete envoye.';
    msg.style.display = 'block';
  }
</script>
<script>
  (function() {
    var APP_VERSION = '2026-04-18i';
    var lastVersion = localStorage.getItem('app_version');
    if (lastVersion !== APP_VERSION) {
      localStorage.setItem('app_version', APP_VERSION);
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(regs) {
          regs.forEach(function(r) { r.unregister(); });
        });
      }
      if ('caches' in window) {
        caches.keys().then(function(keys) {
          keys.forEach(function(k) { caches.delete(k); });
        });
      }
      setTimeout(function() { location.reload(true); }, 500);
      return;
    }
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').then(function(reg) {
        reg.addEventListener('updatefound', function() {
          var nw = reg.installing;
          nw.addEventListener('statechange', function() {
            if (nw.state === 'activated') location.reload();
          });
        });
        setInterval(function() { reg.update(); }, 10000);
        reg.update();
      });
    }
  })();
</script>

</body>
</html>
