databases:
  - name: lcx-agency-db
    plan: free
    databaseName: lcx_agency
    user: lcx_user

services:
  - type: web
    name: lcx-agency-dashboard
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: lcx-agency-db
          property: connectionString
